name: 本番環境デプロイ (main)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: famnote
  REGION: asia-northeast1
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/famnote

jobs:
  test:
    name: 型チェック・ユニットテスト
    runs-on: ubuntu-latest

    steps:
      - name: ソースコードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 22 をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: node_modules キャッシュ
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: 依存関係のインストール
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --frozen-lockfile

      - name: TypeScript 型チェック・ビルド（本番環境）
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}

      - name: ユニットテストの実行
        run: npm run test

      - name: ビルド成果物をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: dist-prod
          path: dist/
          retention-days: 1

  e2e:
    name: E2Eテスト
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: ソースコードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 22 をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: node_modules キャッシュ
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: 依存関係のインストール
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --frozen-lockfile

      - name: Playwright ブラウザキャッシュ
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Playwright ブラウザをインストール
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Playwright システム依存関係のインストール（キャッシュヒット時）
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: ビルド成果物をダウンロード
        uses: actions/download-artifact@v4
        with:
          name: dist-prod
          path: dist/

      - name: E2Eテストの実行
        run: npm run test:e2e -- --project=chromium
        env:
          CI: true
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}

      - name: E2Eテストレポートをアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: playwright-report/
          retention-days: 7

  deploy:
    name: 本番環境デプロイ
    runs-on: ubuntu-latest
    needs: e2e
    if: github.event_name == 'push'

    steps:
      - name: ソースコードをチェックアウト
        uses: actions/checkout@v4

      - name: GCP認証
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloudのセットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: ビルド成果物をダウンロード
        uses: actions/download-artifact@v4
        with:
          name: dist-prod
          path: dist/

      - name: Dockerイメージをビルドしてプッシュ
        run: gcloud builds submit --tag $IMAGE .

      - name: Cloud Run（本番環境）にデプロイ
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "NODE_ENV=production"

      - name: デプロイ完了通知
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --platform managed --region $REGION --format 'value(status.url)')
          echo "本番環境デプロイ完了: $URL"
