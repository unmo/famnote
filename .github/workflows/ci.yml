name: CI（継続的インテグレーション）

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: テスト・型チェック
    runs-on: ubuntu-latest

    steps:
      - name: ソースコードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 22 をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 依存関係のインストール
        run: npm ci --frozen-lockfile

      - name: TypeScript 型チェック・ビルド
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: dummy_key_for_ci
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy_project
          VITE_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:dummy'
          VITE_APP_URL: http://localhost:3000

      - name: ユニットテストの実行
        run: npm run test

      - name: テストカバレッジレポート
        run: npm run coverage
        continue-on-error: true
