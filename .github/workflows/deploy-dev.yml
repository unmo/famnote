name: 開発環境デプロイ (develop)

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  SERVICE_NAME: famnote-dev
  REGION: asia-northeast1

jobs:
  test:
    name: 型チェック・ユニットテスト
    runs-on: ubuntu-latest
    environment: develop

    steps:
      - name: ソースコードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 22 をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: node_modules キャッシュ
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: 依存関係のインストール
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --frozen-lockfile

      - name: TypeScript 型チェック・ビルド（開発環境）
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}

      - name: ユニットテストの実行
        run: npm run test

  deploy:
    name: 開発環境デプロイ
    runs-on: ubuntu-latest
    needs: test
    environment: develop

    steps:
      - name: ソースコードをチェックアウト
        uses: actions/checkout@v4

      - name: GCP認証
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloudのセットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker認証
        run: gcloud auth configure-docker

      - name: Docker Buildx のセットアップ
        uses: docker/setup-buildx-action@v3

      - name: Dockerイメージをビルドしてプッシュ
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
            VITE_APP_URL=${{ secrets.VITE_APP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cloud Run（開発環境）にデプロイ
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5

      - name: デプロイ完了通知
        run: |
          echo "開発環境デプロイ完了: ${{ steps.deploy.outputs.url }}"
