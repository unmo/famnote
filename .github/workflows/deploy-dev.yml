name: 開発環境デプロイ (develop)

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  SERVICE_NAME: famnote-dev
  REGION: asia-northeast1

jobs:
  test:
    name: 型チェック・ユニットテスト
    runs-on: ubuntu-latest
    environment: develop

    steps:
      - name: ソースコードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 22 をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: node_modules キャッシュ
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: 依存関係のインストール
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --frozen-lockfile

      - name: TypeScript 型チェック・ビルド（開発環境）
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: ユニットテストの実行
        run: npm run test

      - name: ビルド成果物をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: dist-dev
          path: dist/
          retention-days: 1

  deploy:
    name: 開発環境デプロイ
    runs-on: ubuntu-latest
    needs: test
    environment: develop

    steps:
      - name: ソースコードをチェックアウト
        uses: actions/checkout@v4

      - name: GCP認証
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloudのセットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: ビルド成果物をダウンロード
        uses: actions/download-artifact@v4
        with:
          name: dist-dev
          path: dist/

      - name: Dockerイメージをビルドしてプッシュ
        run: gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/$SERVICE_NAME --suppress-logs .

      - name: Cloud Run（開発環境）にデプロイ
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/$SERVICE_NAME \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "NODE_ENV=development"

      - name: デプロイ完了通知
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --platform managed --region $REGION --format 'value(status.url)')
          echo "開発環境デプロイ完了: $URL"
