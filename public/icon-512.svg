<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.20"/>
      <stop offset="45%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0284c7" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Full bleed background (no rx — OS applies mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Top shine -->
  <rect width="512" height="256" fill="url(#shine)"/>

  <!-- Bold white F, fills most of the canvas -->
  <!-- Vertical bar -->
  <rect x="112" y="96" width="80" height="320" rx="20" fill="white" filter="url(#shadow)"/>
  <!-- Top horizontal bar -->
  <rect x="112" y="96" width="240" height="80" rx="20" fill="white" filter="url(#shadow)"/>
  <!-- Middle horizontal bar -->
  <rect x="112" y="226" width="178" height="70" rx="18" fill="white" opacity="0.92"/>

  <!-- Amber accent dot -->
  <circle cx="370" cy="370" r="44" fill="#fbbf24"/>
  <circle cx="370" cy="370" r="24" fill="white" opacity="0.88"/>
</svg>
