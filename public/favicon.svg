<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0c1f35"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>
  <!-- ノートブック本体 -->
  <rect x="12" y="11" width="32" height="42" rx="4" fill="white" opacity="0.97"/>
  <!-- 背表紙 -->
  <rect x="12" y="11" width="6" height="42" rx="4" fill="#1E3A5F" opacity="0.12"/>
  <rect x="12" y="11" width="2.5" height="42" rx="1.25" fill="url(#accent)" opacity="0.9"/>
  <!-- 罫線1（アクセントカラー） -->
  <line x1="20" y1="21" x2="40" y2="21" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- 罫線2〜4（グレー） -->
  <line x1="20" y1="27" x2="40" y2="27" stroke="#94a3b8" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="33" x2="36" y2="33" stroke="#94a3b8" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="39" x2="38" y2="39" stroke="#94a3b8" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <!-- ハート（家族アイコン） -->
  <path d="M32 47 C32 47 24 41 24 37.5 C24 35.0 26.0 33 28.5 33 C30.0 33 31.2 33.7 32 34.8 C32.8 33.7 34.0 33 35.5 33 C38.0 33 40 35.0 40 37.5 C40 41 32 47 32 47Z" fill="url(#accent)" opacity="0.95"/>
  <!-- リング（右側） -->
  <circle cx="49" cy="22" r="3.5" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.85"/>
  <circle cx="49" cy="32" r="3.5" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.85"/>
  <circle cx="49" cy="42" r="3.5" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.85"/>
</svg>
