<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0f2040"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 上部ハイライト -->
  <rect width="64" height="28" rx="14" fill="white" opacity="0.04"/>
  <!-- F の縦棒 -->
  <rect x="18" y="14" width="6" height="36" rx="3" fill="url(#letter)" filter="url(#glow)"/>
  <!-- F の上横棒 -->
  <rect x="18" y="14" width="24" height="6" rx="3" fill="url(#letter)" filter="url(#glow)"/>
  <!-- F の中横棒 -->
  <rect x="18" y="29" width="18" height="5" rx="2.5" fill="url(#letter)" opacity="0.85"/>
  <!-- アクセントドット -->
  <circle cx="47" cy="47" r="4" fill="#0EA5E9" opacity="0.7"/>
</svg>
