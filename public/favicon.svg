<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="60%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0369a1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background with brand blue -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Top shine overlay -->
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>

  <!-- Bold white F -->
  <!-- Vertical bar -->
  <rect x="14" y="12" width="10" height="40" rx="2.5" fill="white" filter="url(#shadow)"/>
  <!-- Top horizontal bar -->
  <rect x="14" y="12" width="30" height="10" rx="2.5" fill="white" filter="url(#shadow)"/>
  <!-- Middle horizontal bar -->
  <rect x="14" y="28" width="22" height="9" rx="2.5" fill="white" opacity="0.9"/>

  <!-- Accent dot (amber) -->
  <circle cx="46" cy="46" r="5.5" fill="#fbbf24"/>
  <circle cx="46" cy="46" r="3" fill="white" opacity="0.85"/>
</svg>
